name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Ensure service exists
        run: |
          railway add --service grudge-warlords || echo "Service may already exist"

      - name: Deploy to Railway
        run: railway up --service grudge-warlords --yes --detach
