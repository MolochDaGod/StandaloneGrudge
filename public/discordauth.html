<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Grudge Warlords</title>
<meta name="description" content="Sign in with Discord to play Grudge Warlords — a dark fantasy turn-based RPG.">
<meta property="og:title" content="Grudge Warlords — Discord Login">
<meta property="og:description" content="Connect your Discord account to join the battle.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Jost:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--bg2:#12121f;--bg3:#1a1a2e;
  --gold:#d4a017;--gold-dim:#a07c12;--red:#e94560;--discord:#5865F2;
  --text:#e0e0e0;--dim:#888;--border:#2a2a3e;
}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 50% 0%,rgba(233,69,96,0.06) 0%,transparent 60%)}
h1,h2,h3,h4{font-family:'Cinzel',serif}

.login-container{width:100%;max-width:460px;padding:20px}

.login-card{background:linear-gradient(180deg,var(--bg2) 0%,rgba(15,15,28,0.98) 100%);border:1px solid var(--border);border-radius:14px;padding:44px 36px;text-align:center;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--red))}

.logo{font-size:40px;color:var(--red);font-family:'Cinzel',serif;font-weight:900;letter-spacing:3px;margin-bottom:2px;text-shadow:0 0 24px rgba(233,69,96,0.35)}
.logo-sub{font-size:13px;color:var(--gold-dim);letter-spacing:5px;text-transform:uppercase;margin-bottom:28px;font-weight:600}

.scope-info{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:28px;text-align:left}
.scope-info h4{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.scope-item{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;color:var(--text)}
.scope-item .check{color:#4caf50;font-size:16px;min-width:20px;text-align:center}
.scope-item .label{color:var(--dim);font-size:10px;margin-left:auto;background:var(--bg);padding:2px 8px;border-radius:3px;font-family:monospace;letter-spacing:0.5px}

.discord-btn{width:100%;padding:15px 24px;background:var(--discord);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:'Jost',sans-serif;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;box-shadow:0 4px 16px rgba(88,101,242,0.35)}
.discord-btn:hover{background:#4752c4;transform:translateY(-2px);box-shadow:0 6px 20px rgba(88,101,242,0.45)}
.discord-btn:active{transform:translateY(0)}
.discord-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.discord-btn svg{flex-shrink:0}

.status-msg{margin-top:18px;padding:14px;border-radius:8px;font-size:13px;display:none}
.status-msg.loading{display:block;background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.status-msg.success{display:block;background:rgba(76,175,80,0.12);color:#66bb6a;border:1px solid rgba(76,175,80,0.25)}
.status-msg.error{display:block;background:rgba(233,69,96,0.12);color:var(--red);border:1px solid rgba(233,69,96,0.25)}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--discord);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.user-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:24px;margin-top:24px;display:none;text-align:left}
.user-card.show{display:block}
.user-card .user-header{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.user-card .avatar{width:52px;height:52px;border-radius:50%;border:2px solid var(--gold);background:var(--bg);object-fit:cover}
.user-card .user-name{font-size:18px;font-weight:700;font-family:'Cinzel',serif;color:var(--gold)}
.user-card .user-id{font-size:11px;color:var(--dim);margin-top:3px}
.user-card .session-info{font-size:12px;color:var(--dim);padding:10px 0;border-top:1px solid var(--border);margin-top:10px}
.user-card .session-token{font-family:monospace;font-size:10px;color:var(--dim);word-break:break-all;background:var(--bg);padding:8px 10px;border-radius:6px;margin-top:6px;border:1px solid var(--border)}

.guild-status{margin-top:12px;font-size:12px;padding:8px 12px;border-radius:6px;display:none}
.guild-status.joined{display:block;background:rgba(76,175,80,0.12);color:#66bb6a;border:1px solid rgba(76,175,80,0.2)}
.guild-status.failed{display:block;background:rgba(233,69,96,0.08);color:var(--dim);border:1px solid var(--border)}

.btn-row{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
.play-btn{flex:1;padding:12px 20px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0a12;border:none;border-radius:8px;cursor:pointer;font-family:'Cinzel',serif;font-size:14px;font-weight:700;text-decoration:none;text-align:center;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.play-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.logout-btn{padding:12px 20px;background:transparent;color:var(--red);border:1px solid rgba(233,69,96,0.4);border-radius:8px;cursor:pointer;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;transition:all 0.2s}
.logout-btn:hover{background:rgba(233,69,96,0.15);border-color:var(--red)}

.divider{height:1px;background:var(--border);margin:24px 0}

.nav-links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.nav-links a{color:var(--dim);text-decoration:none;font-size:12px;padding:7px 16px;border:1px solid var(--border);border-radius:6px;transition:all 0.2s;letter-spacing:0.5px}
.nav-links a:hover{color:var(--gold);border-color:var(--gold)}

.footer{margin-top:24px;font-size:11px;color:#444;text-align:center;letter-spacing:0.5px}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="logo">GRUDGE</div>
    <div class="logo-sub">Warlords</div>

    <div id="login-section">
      <div class="scope-info">
        <h4>Discord Permissions</h4>
        <div class="scope-item">
          <span class="check">&#10003;</span>
          Read your username &amp; avatar
          <span class="label">identify</span>
        </div>
        <div class="scope-item">
          <span class="check">&#10003;</span>
          Read your email address
          <span class="label">email</span>
        </div>
        <div class="scope-item">
          <span class="check">&#10003;</span>
          Auto-join Grudge Warlords server
          <span class="label">guilds.join</span>
        </div>
      </div>

      <button id="login-btn" class="discord-btn" onclick="startLogin()">
        <svg width="24" height="18" viewBox="0 0 71 55" fill="white"><path d="M60.1 4.9A58.5 58.5 0 0 0 45.4.2a.2.2 0 0 0-.2.1 40.8 40.8 0 0 0-1.8 3.7 54 54 0 0 0-16.2 0A37.4 37.4 0 0 0 25.4.3a.2.2 0 0 0-.2-.1A58.4 58.4 0 0 0 10.5 5a.2.2 0 0 0-.1.1C1.5 18.7-.9 32 .3 45.1v.1a58.8 58.8 0 0 0 17.9 9 .2.2 0 0 0 .3-.1 42 42 0 0 0 3.6-5.9.2.2 0 0 0-.1-.3 38.8 38.8 0 0 1-5.5-2.6.2.2 0 0 1 0-.4l1.1-.9a.2.2 0 0 1 .2 0 42 42 0 0 0 35.6 0 .2.2 0 0 1 .2 0l1.1.9a.2.2 0 0 1 0 .3 36.4 36.4 0 0 1-5.5 2.7.2.2 0 0 0-.1.3 47.2 47.2 0 0 0 3.6 5.8.2.2 0 0 0 .3.1A58.6 58.6 0 0 0 71 45.2v-.1C72.4 30.1 68.4 17 60.2 5a.2.2 0 0 0-.1 0zM23.7 37a6.8 6.8 0 0 1-6.3-7 6.7 6.7 0 0 1 6.3-7c3.4 0 6.3 3.1 6.2 7a6.7 6.7 0 0 1-6.2 7zm23.2 0a6.8 6.8 0 0 1-6.3-7 6.7 6.7 0 0 1 6.3-7c3.4 0 6.4 3.1 6.3 7a6.8 6.8 0 0 1-6.3 7z"/></svg>
        Sign in with Discord
      </button>

      <div id="status" class="status-msg"></div>
    </div>

    <div id="user-card" class="user-card">
      <div class="user-header">
        <img id="user-avatar" class="avatar" src="" alt="Avatar">
        <div>
          <div id="user-name" class="user-name"></div>
          <div id="user-discord-id" class="user-id"></div>
        </div>
      </div>
      <div id="guild-status" class="guild-status"></div>
      <div class="session-info">
        Session Token:
        <div id="session-token-display" class="session-token"></div>
      </div>
      <div class="btn-row">
        <a href="https://grudgewarlords.com" class="play-btn">&#9876; Play Game</a>
        <button class="logout-btn" onclick="doLogout()">Sign Out</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="nav-links">
      <a href="https://grudgewarlords.com/compendium">Compendium</a>
      <a href="https://grudgewarlords.com/hero-codex">Hero Codex</a>
      <a href="https://grudgewarlords.com/arena">Arena</a>
      <a href="https://grudgewarlords.com">Play Game</a>
      <a href="https://discord.gg/KmAC5aXs84" target="_blank" rel="noopener">Discord</a>
    </div>

    <div class="footer">Grudge Studio &copy; 2026 &mdash; All Rights Reserved</div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var GAME_ORIGIN = window.location.origin;
  var API_ORIGIN = window.location.origin;
  var REDIRECT_URI = window.location.origin + '/discordauth';

  var SESSION_KEY = 'grudge_session_token';
  var USER_KEY = 'discordUser';

  function setStatus(type, msg) {
    var el = document.getElementById('status');
    el.className = 'status-msg ' + type;
    el.innerHTML = (type === 'loading' ? '<span class="spinner"></span>' : '') + msg;
  }

  function getAvatarUrl(user) {
    if (user.avatar) {
      return 'https://cdn.discordapp.com/avatars/' + user.id + '/' + user.avatar + '.png?size=128';
    }
    var index = user.discriminator && user.discriminator !== '0'
      ? parseInt(user.discriminator) % 5
      : (parseInt(user.id) >> 22) % 6;
    return 'https://cdn.discordapp.com/embed/avatars/' + index + '.png';
  }

  function showUser(user, token, guildJoined) {
    document.getElementById('login-section').style.display = 'none';
    var card = document.getElementById('user-card');
    card.classList.add('show');

    document.getElementById('user-avatar').src = getAvatarUrl(user);
    document.getElementById('user-name').textContent = user.globalName || user.username;
    document.getElementById('user-discord-id').textContent = '@' + user.username + (user.email ? ' \u2022 ' + user.email : '');
    document.getElementById('session-token-display').textContent = token.slice(0, 12) + '\u2026' + token.slice(-8);

    var guildEl = document.getElementById('guild-status');
    if (guildJoined === true) {
      guildEl.className = 'guild-status joined';
      guildEl.innerHTML = '&#10003; Joined Grudge Warlords Discord server';
    } else if (guildJoined === false) {
      guildEl.className = 'guild-status failed';
      guildEl.textContent = 'Could not auto-join server (you may already be a member)';
    }
  }

  function checkExistingSession() {
    var token = localStorage.getItem(SESSION_KEY);
    var userRaw = localStorage.getItem(USER_KEY);
    if (token && userRaw) {
      try {
        var user = JSON.parse(userRaw);
        showUser(user, token, null);
      } catch(e) {
        localStorage.removeItem(SESSION_KEY);
        localStorage.removeItem(USER_KEY);
      }
    }
  }

  function handleCallback() {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var state = params.get('state');

    if (!code) return false;

    // State is now verified server-side via HMAC signature — clear stale client state
    localStorage.removeItem('grudge_oauth_state');

    setStatus('loading', 'Authenticating with Discord\u2026');
    document.getElementById('login-btn').disabled = true;

    fetch(API_ORIGIN + '/api/discord/callback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code, state: state, redirect_uri: REDIRECT_URI })
    })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.error || 'Authentication failed'); });
      return r.json();
    })
    .then(function(data) {
      if (data.sessionToken && data.user) {
        localStorage.setItem(SESSION_KEY, data.sessionToken);
        localStorage.setItem(USER_KEY, JSON.stringify(data.user));
        localStorage.removeItem('grudge_oauth_state');

        setStatus('success', 'Welcome, ' + (data.user.globalName || data.user.username) + '!');
        showUser(data.user, data.sessionToken, data.guildJoined || false);

        window.history.replaceState({}, '', window.location.pathname);
      } else {
        setStatus('error', 'Unexpected response from server.');
        document.getElementById('login-btn').disabled = false;
      }
    })
    .catch(function(err) {
      setStatus('error', err.message || 'Login failed. Please try again.');
      document.getElementById('login-btn').disabled = false;
    });

    return true;
  }

  window.startLogin = function() {
    setStatus('loading', 'Connecting to Discord\u2026');
    document.getElementById('login-btn').disabled = true;

    fetch(API_ORIGIN + '/api/discord/login?redirect_uri=' + encodeURIComponent(REDIRECT_URI))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.url) {
        localStorage.setItem('grudge_oauth_state', data.state);
        window.location.href = data.url;
      } else {
        setStatus('error', 'Could not start login flow.');
        document.getElementById('login-btn').disabled = false;
      }
    })
    .catch(function(err) {
      setStatus('error', 'Server unreachable. Please try again later.');
      document.getElementById('login-btn').disabled = false;
    });
  };

  window.doLogout = function() {
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(USER_KEY);
    localStorage.removeItem('grudge_oauth_state');
    document.getElementById('user-card').classList.remove('show');
    document.getElementById('login-section').style.display = '';
    document.getElementById('status').className = 'status-msg';
    document.getElementById('login-btn').disabled = false;
  };

  if (!handleCallback()) {
    checkExistingSession();
  }

})();
</script>

</body>
</html>
