<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grudge Warlords • Weapon Skill Atlas</title>
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" href="/images/grudge_rpg_logo.png" />
<link rel="apple-touch-icon" href="/images/grudge_rpg_logo.png" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070a12;
  --panel:#101522;
  --panel2:#141a2b;
  --card:#1a2238;
  --line:#2a3552;
  --text:#e9eeff;
  --muted:#9aa7c6;
  --gold:#d8b14e;
  --green:#29d383;
  --red:#ff5e6a;
  --blue:#5aa0ff;
  --purple:#a97dff;
  --orange:#ff9d4d;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
html,body{height:100%}
body{
  font-family:Inter,Segoe UI,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 500px at -20% -10%,rgba(90,160,255,.08),transparent 60%),
    radial-gradient(900px 400px at 120% -10%,rgba(216,177,78,.08),transparent 60%),
    var(--bg);
  display:flex;
  overflow:hidden;
}
::-webkit-scrollbar{height:8px;width:8px}
::-webkit-scrollbar-thumb{background:#2b3550;border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

#sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f1422,#0d1220);
  border-right:1px solid var(--line);
  overflow:auto;
}
.logo{
  position:sticky;top:0;z-index:4;
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#11182a,#0f1422);
}
.logo h1{font-size:14px;letter-spacing:.8px;color:var(--gold);font-weight:800;text-transform:uppercase}
.logo p{font-size:11px;color:var(--muted);margin-top:4px}
.group{padding:12px 0;border-top:1px solid rgba(255,255,255,.03)}
.group-title{
  padding:0 14px 8px;
  font-size:10px;
  color:#6f7d9f;
  text-transform:uppercase;
  letter-spacing:1.4px;
  font-weight:700;
}
.weapon-btn{
  width:100%;
  border:0;
  background:transparent;
  color:var(--text);
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  padding:8px 12px 8px 14px;
  border-left:3px solid transparent;
  transition:.16s ease;
  text-align:left;
}
.weapon-btn:hover{background:#151d31;border-left-color:#668ee9}
.weapon-btn.active{
  background:linear-gradient(90deg,rgba(216,177,78,.16),rgba(216,177,78,.03));
  border-left-color:var(--gold);
}
.weapon-btn img{
  width:28px;height:28px;object-fit:contain;background:#0c1220;border:1px solid #293453;border-radius:6px;padding:3px;box-shadow:var(--shadow)
}
.weapon-btn .name{font-size:12px;font-weight:700}
.weapon-btn .small{font-size:10px;color:var(--muted);margin-top:2px}

#main{flex:1;display:flex;flex-direction:column;min-width:0}
#variant-bar{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:12px 16px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#121a2d,#101624);
}
.v-btn{
  border:1px solid #2d3a58;
  border-radius:10px;
  padding:7px 10px;
  min-width:140px;
  background:var(--panel2);
  color:var(--text);
  cursor:pointer;
  transition:.15s ease;
  display:flex;
  align-items:center;
  gap:8px;
}
.v-btn:hover{border-color:#6f93e8;background:#18213a}
.v-btn.active{border-color:var(--gold);background:linear-gradient(180deg,rgba(216,177,78,.22),rgba(216,177,78,.05))}
.v-btn img{width:26px;height:26px;object-fit:contain;background:#0b1220;border:1px solid #293453;border-radius:6px;padding:3px}
.v-btn .n{font-size:12px;font-weight:700}
.v-btn .t{font-size:10px;color:var(--muted)}

#tabs{
  display:flex;
  border-bottom:1px solid var(--line);
  background:#0f1627;
}
.tab{
  flex:1;
  border:0;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  padding:11px 10px;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:800;
  border-bottom:2px solid transparent;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

#content{flex:1;overflow:auto;padding:18px 20px 28px}
.header{
  display:flex;gap:14px;align-items:center;margin-bottom:16px;padding:0 0 14px;border-bottom:1px solid var(--line)
}
.header img{
  width:52px;height:52px;object-fit:contain;border:1px solid #33415f;border-radius:10px;padding:6px;background:#0d1424;box-shadow:var(--shadow)
}
.header h2{font-size:22px;line-height:1.1}
.header .sub{font-size:12px;color:var(--muted);margin-top:4px}
.badges{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.badge{
  border-radius:999px;border:1px solid;padding:3px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px
}
.b-warrior{color:#ff7d87;border-color:#ff7d8750;background:#ff7d8715}
.b-mage{color:#bb95ff;border-color:#bb95ff50;background:#bb95ff15}
.b-ranger{color:#49de95;border-color:#49de9550;background:#49de9515}
.b-worge{color:#ffb16d;border-color:#ffb16d50;background:#ffb16d15}

.panel{
  background:linear-gradient(180deg,#131c31,#11182b);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  box-shadow:var(--shadow);
}

.variant-lore{
  font-style:italic;color:#bdc8e6;font-size:12px;line-height:1.45;margin-bottom:12px;
  padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px
}
.stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin:0 0 12px
}
.stat{
  background:#0f1728;border:1px solid #2a3552;border-radius:9px;padding:8px 9px
}
.stat .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.stat .v{font-size:12px;font-weight:700;color:#eaf0ff;margin-top:3px}

.section-title{
  margin:16px 0 10px;
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--gold)
}
.section-title::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:3px}

.skill-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
}
.skill-card{
  border:1px solid #2b3860;
  border-radius:12px;
  background:linear-gradient(180deg,#162241,#131d35);
  padding:10px;
  display:flex;
  gap:9px;
  cursor:pointer;
  transition:.15s ease;
}
.skill-card:hover{transform:translateY(-1px);border-color:#7698eb;box-shadow:0 6px 20px rgba(0,0,0,.35)}
.skill-card.signature{border-color:#5b3c44;background:linear-gradient(180deg,#2a1d2a,#1d1827)}
.skill-card.basic{border-color:#3b5a56;background:linear-gradient(180deg,#17332f,#162925)}
.skill-card.passive{border-color:#5b5a34;background:linear-gradient(180deg,#2e2a17,#242113)}
.skill-card .ic{
  width:38px;height:38px;object-fit:contain;border:1px solid #3a4d7a;border-radius:8px;background:#0b1222;padding:4px;flex-shrink:0
}
.skill-card .sn{font-size:12px;font-weight:800}
.skill-card .sd{font-size:10px;color:#bcc9e8;line-height:1.35;margin-top:3px}
.skill-meta{
  display:flex;gap:5px;flex-wrap:wrap;margin-top:7px
}
.chip{
  font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  border:1px solid;border-radius:999px;padding:2px 7px
}
.c-dmg{color:#ff8b95;border-color:#ff8b9559;background:#ff8b9514}
.c-cd{color:#84b2ff;border-color:#84b2ff59;background:#84b2ff14}
.c-type{color:#ffe08a;border-color:#ffe08a59;background:#ffe08a14}
.c-role{color:#90f0ba;border-color:#90f0ba59;background:#90f0ba14}

.mastery-tier{margin:0 0 14px}
.tier-label{
  font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 8px;font-weight:800
}
.mastery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.mastery-card{
  border:1px solid #394a73;border-radius:12px;padding:10px;background:linear-gradient(180deg,#18233f,#141e36);cursor:pointer;transition:.15s
}
.mastery-card:hover{border-color:#88a8f5;transform:translateY(-1px)}
.mastery-head{display:flex;gap:8px;align-items:center}
.mastery-head img{width:34px;height:34px;object-fit:contain;border:1px solid #3c4f7f;border-radius:8px;background:#0d1528;padding:4px}
.mastery-name{font-size:12px;font-weight:800}
.mastery-desc{font-size:10px;color:#b7c4e2;line-height:1.4;margin-top:7px}
.mastery-eff{margin-top:7px;font-size:10px;color:#ffe08a}
.mastery-bonus{margin-top:4px;font-size:10px;color:#95f1bf}

.tt{
  position:fixed;z-index:9999;pointer-events:none;display:none;
  width:320px;max-width:calc(100vw - 20px);
  background:linear-gradient(180deg,#1a2442,#141d33);
  border:1px solid #809fe8;border-radius:12px;padding:12px;box-shadow:0 14px 32px rgba(0,0,0,.45)
}
.tt.show{display:block}
.tt-top{display:flex;gap:9px;align-items:center;padding-bottom:9px;border-bottom:1px solid #334667}
.tt-top img{width:40px;height:40px;object-fit:contain;border:1px solid #40588d;border-radius:8px;background:#0d1528;padding:4px}
.tt-name{font-size:14px;font-weight:900;line-height:1.1}
.tt-kind{font-size:10px;color:#9eb4e6;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.tt-desc{font-size:11px;color:#c8d4f0;line-height:1.45;margin-top:10px}
.tt-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.tt-stat{border:1px solid #34476d;background:#111a30;border-radius:7px;padding:5px 6px}
.tt-stat .k{font-size:9px;color:#8ea4d3;text-transform:uppercase;letter-spacing:.7px}
.tt-stat .v{font-size:11px;color:#e8efff;font-weight:700;margin-top:2px}
.tt-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.tt-tags span{font-size:9px;border:1px solid #556d9f;color:#bfd0f5;background:#1b2847;border-radius:999px;padding:2px 7px}

.empty{
  text-align:center;padding:44px 12px;border:1px dashed #3a4b74;border-radius:12px;color:var(--muted)
}
.empty h3{font-size:18px;color:#dce5ff;margin-top:10px}
.empty p{font-size:12px;margin-top:6px}
</style>
</head>

  <aside id="sidebar">

  bow:['Bow',1],crossbow:['Crossbow',1],gun:['Gun',1],
  shield:['Shield',1]
};

function variantIcon(wId,idx,v){
  const slug=v.name.toLowerCase().split(' ')[0].replace(/[^a-z]/g,'');
  if(NAMED_ICONS[slug]) return NAMED_ICONS[slug];
  if(v.elem && ELEM_ICONS[v.elem]) return ELEM_ICONS[v.elem];
  const b=WPN_NUM[wId];
  if(!b) return WEAPON_ICONS[wId];
  const n=b[1]+idx;
  return ICON('weapons_full/'+b[0]+'_'+(n<10?'0'+n:''+n)+'.png');
}

let curWeapon='sword';
let curVar=0;
let curTab='mastery';

const $weaponList=document.getElementById('weaponList');
const $variantBar=document.getElementById('variant-bar');
const $content=document.getElementById('content');
const $tt=document.getElementById('tooltip');

function classesFor(w){
  return Object.entries(CLASS_USE).filter(([,arr])=>arr.includes(w)).map(([k])=>k);
}

function classBadge(c){
  const cl='b-'+c.toLowerCase();
  return `<span class="badge ${cl}">${c}</span>`;
}

function maybeElemIcon(v){
  return v ? variantIcon(curWeapon, curVar, v) : WEAPON_ICONS[curWeapon];
}

function iconForSkill(name,kind,weapon,elem){
  const key=name.toLowerCase();
  // 1. Real skill DB lookup
  if(SKILL_DB[key]) return SKILL_DB[key].i;
  // 2. Class ability icon lookup
  if(CLASS_ICONS[key]) return CLASS_ICONS[key];
  // 3. Element fallback for caster basics/signatures
  if(elem && ELEM_ICONS[elem] && (kind==='basic'||kind==='signature')) return ELEM_ICONS[elem];
  // 4. Keyword matching fallback
  const n=key;
  if(n.includes('fire')||n.includes('ember')||n.includes('inferno')||n.includes('burn')||n.includes('flame')) return ELEM_ICONS.fire;
  if(n.includes('frost')||n.includes('ice')||n.includes('glacial')||n.includes('chill')||n.includes('blizzard')) return ELEM_ICONS.frost;
  if(n.includes('holy')||n.includes('divine')||n.includes('sacred')||n.includes('grace')||n.includes('radiant')) return ELEM_ICONS.holy;
  if(n.includes('arcane')||n.includes('void')||n.includes('mana')||n.includes('energy')) return ELEM_ICONS.arcane;
  if(n.includes('nature')||n.includes('thorn')||n.includes('vine')||n.includes('growth')||n.includes('rejuvenate')) return ELEM_ICONS.nature;
  if(n.includes('storm')||n.includes('lightning')||n.includes('thunder')||n.includes('shock')) return ELEM_ICONS.lightning;
  if(n.includes('shield')||n.includes('block')||n.includes('fortify')||n.includes('ward')) return WEAPON_ICONS.shield;
  if(n.includes('gun')||n.includes('shot')||n.includes('bullet')||n.includes('reload')||n.includes('snipe')) return WEAPON_ICONS.gun;
  if(n.includes('arrow')||n.includes('bow')) return WEAPON_ICONS.bow;
  if(n.includes('crossbow')||n.includes('bolt')||n.includes('headshot')) return WEAPON_ICONS.crossbow;
  if(n.includes('dagger')||n.includes('shiv')||n.includes('stab')||n.includes('assassin')) return WEAPON_ICONS.dagger;
  if(n.includes('axe')||n.includes('cleave')||n.includes('chop')||n.includes('hew')) return WEAPON_ICONS.axe;
  if(n.includes('hammer')||n.includes('maul')||n.includes('bash')||n.includes('smash')||n.includes('quake')) return WEAPON_ICONS.hammer;
  if(n.includes('spear')||n.includes('lance')||n.includes('impale')||n.includes('thrust')) return WEAPON_ICONS.lance;
  if(n.includes('sword')||n.includes('blade')||n.includes('slash')||n.includes('parry')) return WEAPON_ICONS.sword;
  if(n.includes('shadow')||n.includes('wraith')||n.includes('dusk')||n.includes('phantom')) return MI('smoke.png');
  if(n.includes('blood')||n.includes('crimson')||n.includes('bleed')) return MI('Burns.png');
  if(kind==='passive') return MI('Glow.png');
  return WEAPON_ICONS[weapon] || WEAPON_ICONS.sword;
}

function skillMeta(name,kind,weapon,elem){
  const key=name.toLowerCase();
  const db=SKILL_DB[key];
  const icon=db ? db.i : iconForSkill(name,kind,weapon,elem);

  // Type detection
  let type='Physical';
  if(elem) type=elem[0].toUpperCase()+elem.slice(1);
  else if(/fire|flame|ember|inferno|burn/.test(key)) type='Fire';
  else if(/frost|ice|glacial|blizzard|chill/.test(key)) type='Frost';
  else if(/holy|divine|sacred|radiant|grace/.test(key)) type='Holy';
  else if(/arcane|void|mana|energy/.test(key)) type='Arcane';
  else if(/nature|thorn|vine|growth|rejuvenate/.test(key)) type='Nature';
  else if(/lightning|storm|thunder|shock/.test(key)) type='Lightning';
  else if(/shadow|wraith|dusk|phantom/.test(key)) type='Shadow';

  // Role detection
  let role='Damage';
  if(/heal|rejuvenate|bloom|salvation|grace/.test(key)) role='Healing';
  else if(/shield|block|fortify|ward|wall|aegis/.test(key)) role='Defense';
  else if(/stun|silence|root|trap|freeze|daze|knock/.test(key)) role='Control';
  else if(/rage|rush|speed|reload|focus|frenzy|aura|surge/.test(key)) role='Buff';
  if(kind==='passive') role='Passive';
  if(kind==='basic') role='Core';
  if(kind==='signature') role='Ultimate';

  // Use real DB data if available
  if(db){
    const isMagic=/staff|tome|wand|focus/.test(weapon)||/fire|frost|holy|arcane|nature|lightning/.test(key);
    const power=db.d<0?`Heal ${Math.abs(db.d)}`:db.d>0?`${db.d} Dmg`:'Utility';
    const cooldown=db.cd===0?'No CD':`${db.cd}s`;
    const cost=kind==='passive'?'—':db.cd===0?'—':isMagic?`${10+db.cd} Mana`:`${8+Math.floor(db.cd/2)} Stamina`;
    const tags=db.fx.slice();
    if(kind==='signature') tags.push('Signature');
    if(kind==='passive') tags.push('Always On');
    return {name,kind,type,role,power,cooldown,cost,tags,desc:db.ds,icon};
  }

  // Fallback for skills not in DB
  const hash=[...name].reduce((a,c)=>a+c.charCodeAt(0),0);
  const power=kind==='passive'?'Passive':`${90+(hash%120)}%`;
  const cooldown=kind==='basic'?'No CD':kind==='passive'?'—':kind==='signature'?`${35+(hash%16)}s`:`${6+(hash%12)}s`;
  const isMagic=/staff|tome|wand|focus/.test(weapon)||/fire|frost|holy|arcane|nature|lightning|mana/.test(key+weapon);
  const cost=kind==='passive'?'—':isMagic?`${14+(hash%18)} Mana`:`${8+(hash%14)} Stamina`;
  const tags=[];
  if(role!=='Passive') tags.push(type);
  if(/bleed|blood|crimson/.test(key)) tags.push('Bleed');
  if(/burn|fire|flame|ember/.test(key)) tags.push('Burn');
  if(/frost|ice|freeze|chill/.test(key)) tags.push('Chill');
  if(/poison|venom/.test(key)) tags.push('Poison');
  if(/stun|daze|silence|root|trap|knock/.test(key)) tags.push('CC');
  if(/lifesteal|leech|blood/.test(key)) tags.push('Sustain');
  if(kind==='signature') tags.push('Signature');
  if(kind==='passive') tags.push('Always On');
  if(tags.length===0) tags.push(role);

  let desc;
  if(kind==='passive') desc=`Passive bonus enhancing your ${weapon} performance. Scales with mastery investment.`;
  else if(kind==='basic') desc=`Core attack building resources and triggering on-hit effects.`;
  else if(kind==='signature') desc=`High-impact ultimate with strong battlefield swing potential.`;
  else desc=`Active ${role.toLowerCase()} skill with ${type.toLowerCase()} impact. Proper timing maximizes effectiveness.`;

  return {name,kind,type,role,power,cooldown,cost,tags,desc,icon};
}

function tooltipHTML(m){
  return `
    <div class="tt-top">
      <img src="${m.icon}" onerror="this.style.display='none'">
      <div>
        <div class="tt-name">${m.name}</div>
        <div class="tt-kind">${m.kind} • ${m.role}</div>
      </div>
    </div>
    <div class="tt-desc">${m.desc}</div>
    <div class="tt-stats">
      <div class="tt-stat"><div class="k">Type</div><div class="v">${m.type}</div></div>
      <div class="tt-stat"><div class="k">Power</div><div class="v">${m.power}</div></div>
      <div class="tt-stat"><div class="k">Cooldown</div><div class="v">${m.cooldown}</div></div>
      <div class="tt-stat"><div class="k">Cost</div><div class="v">${m.cost}</div></div>
    </div>
    <div class="tt-tags">${m.tags.map(t=>`<span>${t}</span>`).join('')}</div>
  `;
}

function showTT(e,meta){
  $tt.innerHTML=tooltipHTML(meta);
  $tt.classList.add('show');
  moveTT(e);
}
function moveTT(e){
  let x=e.clientX+14,y=e.clientY+14;
  const w=320,h=$tt.offsetHeight||240;
  if(x+w>window.innerWidth-10)x=e.clientX-w-14;
  if(y+h>window.innerHeight-10)y=window.innerHeight-h-10;
  $tt.style.left=x+'px';$tt.style.top=y+'px';
}
function hideTT(){ $tt.classList.remove('show'); }

function attachTT(el,meta){
  el.addEventListener('mouseenter',e=>showTT(e,meta));
  el.addEventListener('mousemove',moveTT);
  el.addEventListener('mouseleave',hideTT);
}

function buildSidebar(){
  const cats=['Melee','Two-Handed','Ranged','Magic','Off-Hand'];
  let html='';
  for(const c of cats){
    html+=`<div class="group"><div class="group-title">${c}</div>`;
    WEAPONS.filter(w=>w.cat===c).forEach(w=>{
      html+=`
        <button class="weapon-btn ${w.id===curWeapon?'active':''}" data-w="${w.id}">
          <img src="${WEAPON_ICONS[w.id]}" onerror="this.style.display='none'">
          <div>
            <div class="name">${w.name}</div>
            <div class="small">${(V[w.id]||[]).length} variants</div>
          </div>
        </button>`;
    });
    html+='</div>';
  }
  $weaponList.innerHTML=html;
  $weaponList.querySelectorAll('.weapon-btn').forEach(btn=>{
    btn.onclick=()=>{
      curWeapon=btn.dataset.w;
      curVar=0;
      buildSidebar();
      renderVariantBar();
      render();
    };
  });
}

function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
  render();
}

function renderVariantBar(){
  const vars=V[curWeapon]||[];
  $variantBar.innerHTML=vars.map((v,i)=>{
    const ic=variantIcon(curWeapon,i,v);
    return `
      <button class="v-btn ${i===curVar?'active':''}" data-i="${i}">
        <img src="${ic}" onerror="this.style.display='none'">
        <div>
          <div class="n">${v.name}</div>
          <div class="t">${v.sub}</div>
        </div>
      </button>`;
  }).join('');
  $variantBar.querySelectorAll('.v-btn').forEach(b=>b.onclick=()=>{
    curVar=Number(b.dataset.i);
    renderVariantBar();
    render();
  });
}

function headerBlock(){
  const w=WEAPONS.find(x=>x.id===curWeapon);
  const variant=(V[curWeapon]||[])[curVar];
  const icon=maybeElemIcon(variant);
  return `
    <div class="header">
      <img src="${icon}" onerror="this.style.display='none'">
      <div>
        <h2>${variant ? variant.name : w.name}</h2>
        <div class="sub">${variant ? variant.sub : w.name} • ${curTab==='mastery'?'Passive Mastery Tree':'Combat Skill Loadout'}</div>
        <div class="badges">${classesFor(curWeapon).map(classBadge).join('')}</div>
      </div>
    </div>
  `;
}

function makeSkillCard(meta,cls=''){
  return `
    <div class="skill-card ${cls}" data-meta='${JSON.stringify(meta).replace(/'/g,'&#39;')}'>
      <img class="ic" src="${meta.icon}" onerror="this.style.display='none'">
      <div>
        <div class="sn">${meta.name}</div>
        <div class="sd">${meta.desc}</div>
        <div class="skill-meta">
          <span class="chip c-type">${meta.type}</span>
          <span class="chip c-role">${meta.role}</span>
          <span class="chip c-cd">${meta.cooldown}</span>
          <span class="chip c-dmg">${meta.power}</span>
        </div>
      </div>
    </div>
  `;
}

function bindRenderedTooltips(){
  $content.querySelectorAll('[data-meta]').forEach(el=>{
    const meta=JSON.parse(el.dataset.meta.replace(/&#39;/g,"'"));
    attachTT(el,meta);
  });
}

function renderSkills(){
  const w=WEAPONS.find(x=>x.id===curWeapon);
  const variant=(V[curWeapon]||[])[curVar];
  if(!variant){
    $content.innerHTML=headerBlock()+`<div class="empty"><h3>No variant data</h3><p>Select another weapon type.</p></div>`;
    return;
  }

  const weaponStyle = /staff|tome|wand|focus/.test(curWeapon)
    ? 'Caster'
    : /shield/.test(curWeapon)
      ? 'Defender'
      : /bow|crossbow|gun/.test(curWeapon)
        ? 'Ranged'
        : 'Melee';

  const burst = 100 + (variant.name.length*11)%75;
  const sustain = 90 + (variant.abilities.join('').length)%80;
  const control = 80 + (variant.passives.join('').length)%85;

  let html=headerBlock();
  html+=`
    <div class="panel">
      <div class="variant-lore">"${variant.lore}"</div>
      <div class="stats">
        <div class="stat"><div class="k">Weapon Style</div><div class="v">${weaponStyle}</div></div>
        <div class="stat"><div class="k">Burst Index</div><div class="v">${burst}</div></div>
        <div class="stat"><div class="k">Sustain Index</div><div class="v">${sustain}</div></div>
        <div class="stat"><div class="k">Control Index</div><div class="v">${control}</div></div>
      </div>

      <div class="section-title">Core + Active Skills</div>
      <div class="skill-grid">
        ${makeSkillCard(skillMeta(variant.basic,'basic',curWeapon,variant.elem),'basic')}
        ${variant.abilities.map(s=>makeSkillCard(skillMeta(s,'ability',curWeapon,variant.elem))).join('')}
        ${makeSkillCard(skillMeta(variant.sig,'signature',curWeapon,variant.elem),'signature')}
      </div>

      <div class="section-title">Passive Traits</div>
      <div class="skill-grid">
        ${variant.passives.map(p=>makeSkillCard(skillMeta(p,'passive',curWeapon,variant.elem),'passive')).join('')}
      </div>
    </div>
  `;
  $content.innerHTML=html;
  bindRenderedTooltips();
}

function renderMastery(){
  const base=MASTERY[curWeapon] ? curWeapon : (MASTERY_ALIAS[curWeapon]||null);
  const tree=base ? MASTERY[base] : null;
  let html=headerBlock();
  if(!tree){
    html+=`<div class="empty"><h3>Mastery Not Added Yet</h3><p>This weapon type currently has no passive tree configured.</p></div>`;
    $content.innerHTML=html;
    return;
  }
  html+=`<div class="panel">`;
  if(base!==curWeapon){
    html+=`<div class="variant-lore">This weapon uses shared mastery progression from <b>${base}</b>.</div>`;
  }
  tree.tiers.forEach(t=>{
    html+=`<div class="mastery-tier"><div class="tier-label">${t.name}</div><div class="mastery-grid">`;
    t.skills.forEach(s=>{
      const meta=skillMeta(s.name,'passive',curWeapon,null);
      meta.icon=s.icon||meta.icon;
      meta.desc=s.desc;
      meta.power=s.effect;
      meta.cost='Skill Point';
      meta.cooldown='—';
      html+=`
        <div class="mastery-card" data-meta='${JSON.stringify(meta).replace(/'/g,'&#39;')}'>
          <div class="mastery-head">
            <img src="${s.icon}" onerror="this.style.display='none'">
            <div>
              <div class="mastery-name">${s.name}</div>
            </div>
          </div>
          <div class="mastery-desc">${s.desc}</div>
          <div class="mastery-eff">Effect: ${s.effect}</div>
          <div class="mastery-bonus">${s.bonus}</div>
        </div>
      `;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  $content.innerHTML=html;
  bindRenderedTooltips();
}

function render(){
  if(curTab==='skills') renderSkills();
  else renderMastery();
}

buildSidebar();
renderVariantBar();
render();
</script>
</body>
</html>
