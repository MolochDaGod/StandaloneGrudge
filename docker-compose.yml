version: '3.8'

services:
  # Game Server
  grudge-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grudge-warlords-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      - "${UNITY_SERVER_PORT:-7777}:7777"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - UNITY_SERVER_PORT=${UNITY_SERVER_PORT:-7777}
      - DB_HOST=postgres
      - REDIS_HOST=redis
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./builds:/app/builds
    depends_on:
      - postgres
      - redis
    networks:
      - grudge-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: grudge-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-grudge_warlords}
      - POSTGRES_USER=${DB_USER:-grudge_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - grudge-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: grudge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - grudge-network

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: grudge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/ssl:/etc/nginx/ssl:ro
    depends_on:
      - grudge-server
    networks:
      - grudge-network

volumes:
  postgres-data:
  redis-data:

networks:
  grudge-network:
    driver: bridge
